<svg width="1440" height="420" viewBox="0 0 1440 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">agentic-workstation</title>
  <desc id="desc">A futuristic AI-first workstation banner with orbit lines, glowing gradients, and capability cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.45" stop-color="#07111f"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <radialGradient id="auraA" cx="30%" cy="18%" r="70%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.42"/>
      <stop offset="0.38" stop-color="#0ea5e9" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auraB" cx="76%" cy="52%" r="55%">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.45"/>
      <stop offset="0.42" stop-color="#7c3aed" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.48" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#84cc16"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#94a3b8" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1440" height="420" rx="34" fill="url(#bg)"/>
  <rect width="1440" height="420" rx="34" fill="url(#auraA)"/>
  <rect width="1440" height="420" rx="34" fill="url(#auraB)"/>
  <rect width="1440" height="420" rx="34" fill="url(#grid)"/>
  <path d="M48 330 C274 230 334 78 576 132 C778 177 818 332 1088 242 C1246 190 1326 94 1392 72" fill="none" stroke="url(#stroke)" stroke-width="2" stroke-opacity="0.72" filter="url(#softGlow)"/>
  <path d="M58 358 C282 278 394 180 616 206 C832 232 856 354 1118 290 C1254 257 1340 174 1390 154" fill="none" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.28"/>

  <g transform="translate(94 76)">
    <rect x="0" y="0" width="158" height="38" rx="19" fill="#0f172a" fill-opacity="0.76" stroke="#22d3ee" stroke-opacity="0.45"/>
    <circle cx="24" cy="19" r="5" fill="#84cc16"/>
    <text x="42" y="24" fill="#dff7ff" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700" letter-spacing="1.6">L1 BASELINE</text>

    <text x="0" y="106" fill="#ffffff" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="66" font-weight="900" letter-spacing="-2.8">agentic-workstation</text>
    <text x="2" y="148" fill="#b6c7e3" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="500">AI-first workstation baseline for the best developer experience.</text>
    <text x="2" y="181" fill="#7dd3fc" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" letter-spacing="0.4">skills · agents · MCP · CLI helpers · loops · multi-tool sync</text>

    <g transform="translate(0 232)">
      <rect x="0" y="0" width="184" height="72" rx="22" fill="url(#card)" stroke="#22d3ee" stroke-opacity="0.35"/>
      <text x="22" y="30" fill="#e0f2fe" font-family="Inter, ui-sans-serif, sans-serif" font-size="15" font-weight="800">52+ skill packs</text>
      <text x="22" y="52" fill="#93c5fd" font-family="Inter, ui-sans-serif, sans-serif" font-size="13">ready to compose</text>

      <rect x="202" y="0" width="184" height="72" rx="22" fill="url(#card)" stroke="#a78bfa" stroke-opacity="0.36"/>
      <text x="224" y="30" fill="#f3e8ff" font-family="Inter, ui-sans-serif, sans-serif" font-size="15" font-weight="800">MCP native</text>
      <text x="224" y="52" fill="#c4b5fd" font-family="Inter, ui-sans-serif, sans-serif" font-size="13">servers on demand</text>

      <rect x="404" y="0" width="184" height="72" rx="22" fill="url(#card)" stroke="#84cc16" stroke-opacity="0.38"/>
      <text x="426" y="30" fill="#ecfccb" font-family="Inter, ui-sans-serif, sans-serif" font-size="15" font-weight="800">cross-tool AI</text>
      <text x="426" y="52" fill="#bef264" font-family="Inter, ui-sans-serif, sans-serif" font-size="13">one setup, many agents</text>
    </g>
  </g>

  <g transform="translate(1005 72)" opacity="0.95">
    <circle cx="142" cy="142" r="122" fill="none" stroke="#38bdf8" stroke-opacity="0.24" stroke-width="1.4"/>
    <circle cx="142" cy="142" r="82" fill="none" stroke="#a78bfa" stroke-opacity="0.34" stroke-width="1.4"/>
    <circle cx="142" cy="142" r="42" fill="#020617" stroke="url(#stroke)" stroke-width="2" filter="url(#softGlow)"/>
    <circle cx="142" cy="20" r="7" fill="#22d3ee" filter="url(#softGlow)"/>
    <circle cx="224" cy="106" r="6" fill="#a78bfa" filter="url(#softGlow)"/>
    <circle cx="72" cy="214" r="7" fill="#84cc16" filter="url(#softGlow)"/>
    <path d="M142 100 L190 124 L142 184 L94 124 Z" fill="none" stroke="url(#stroke)" stroke-width="2" stroke-linejoin="round"/>
    <path d="M142 100 L142 184 M94 124 L190 124" stroke="#e0f2fe" stroke-width="1" stroke-opacity="0.55"/>
  </g>

  <rect x="0" y="416" width="1440" height="4" fill="url(#stroke)"/>
</svg>
