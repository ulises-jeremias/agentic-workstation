  # ── Imported from openai/skills (Apache-2.0) ────────────────────────────────
  # Each skill keeps its upstream LICENSE.txt and adds a NOTICE.txt that
  # documents dots-workstation-side modifications. See docs/SKILLS.md → "Imported skills".

  - name: gh-address-comments
    domain: forge
    responsibility: HOW
    role: gh_pr_comment_handler
    capabilities:
      - Inspect open PR review comments and review threads via gh GraphQL
      - Apply fixes for selected comments after user approval
    boundaries:
      - Does not push/merge; pair with github-cli-workflow for forge actions
    triggers:
      - address PR comments
      - resolve review comments
      - respond to PR feedback
    depends_on:
      - github-cli-workflow
    usage_hints: Run gh auth status before invoking; uses scripts/fetch_comments.py (stdlib only)

  - name: gh-fix-ci
    domain: forge
    responsibility: HOW
    role: gh_pr_ci_triage
    capabilities:
      - Triage failing GitHub Actions checks via gh
      - Fetch run/job logs and extract failure snippets
      - Draft a fix plan and request explicit approval before implementing
    boundaries:
      - GitHub Actions only; external providers (Buildkite, CircleCI) reported by URL
      - Does not push commits; pair with github-cli-workflow
    triggers:
      - fix CI
      - debug failing checks
      - why is the build red
    depends_on:
      - github-cli-workflow
      - dots-workstation-planning
    usage_hints: Run scripts/inspect_pr_checks.py; --json for machine-friendly output

  - name: linear
    domain: linear
    responsibility: HOW
    role: linear_mcp_workflows
    capabilities:
      - Manage Linear issues, projects and cycles via Linear MCP (OAuth)
      - Sprint planning, bug triage, documentation audits, workload balance
    boundaries:
      - All access via Linear MCP; do not call Linear REST/GraphQL directly
    triggers:
      - Linear ticket
      - sprint planning in Linear
      - triage Linear bugs
    depends_on: []
    usage_hints: Requires Linear MCP registered in your AI tool — see ~/.local/share/agentic-workstation/mcp/linear/

  - name: figma
    domain: figma
    responsibility: HOW
    role: figma_mcp_entry_point
    capabilities:
      - Entry point for the Figma MCP family
      - Required flow get_design_context → get_metadata → get_screenshot
      - Asset handling and link-based prompting rules
    boundaries:
      - Reads Figma context and writes code; does not write back to Figma
    triggers:
      - Figma URL
      - design-to-code from Figma
      - Figma MCP setup
    depends_on: []
    usage_hints: Requires Figma MCP and FIGMA_OAUTH_TOKEN — see ~/.local/share/agentic-workstation/mcp/figma/

  - name: figma-implement-design
    domain: figma
    responsibility: HOW
    role: figma_design_to_code
    capabilities:
      - Translate a Figma node into production code with 1:1 fidelity
      - Project conventions and design tokens enforcement
    boundaries:
      - Code in user repo only; for canvas writes install opt-in figma-use pack
    triggers:
      - implement design
      - generate code from Figma
      - build component from Figma
    depends_on:
      - figma
    usage_hints: Always start with get_design_context + get_screenshot

  - name: figma-code-connect-components
    domain: figma
    responsibility: HOW
    role: figma_code_connect
    capabilities:
      - Map Figma nodes to existing code components via Code Connect MCP
    boundaries:
      - Mapping only; for canvas writes install opt-in figma-use pack
    triggers:
      - code connect mapping
      - link Figma component to code
    depends_on:
      - figma
    usage_hints: Use scripts/normalize_node_id.py to canonicalize node IDs

  - name: figma-create-design-system-rules
    domain: figma
    responsibility: HOW
    role: figma_agents_md_generator
    capabilities:
      - Generate design system rule files (AGENTS.md, .cursor/rules/, etc.)
