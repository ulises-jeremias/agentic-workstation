# Skills Registry
#
# This file documents skills known to this baseline.
# It is used by `dots-skills` for npm-sourced skills (install + sync).
#
# Deployed to ~/.local/share/dots-ai/skills-registry.yaml via chezmoi.
# Keep in sync with home/.chezmoidata/skills-registry.yaml (same content).
#
# Skills from github/url sources are managed natively by chezmoi:
#   home/private_dot_local/share/dots-ai/.chezmoiexternal.toml.tmpl
#   Opt-in via chezmoidata install_skill_* flags.
#
# Field reference:
#   name:     Unique kebab-case identifier
#   source:   bundled | npm  (github/url → see .chezmoiexternal.toml.tmpl)
#   enabled:  Whether this skill is active by default
#   version:  Current installed version (semver)
#   depends_on: List of dependencies with optional version constraints

skills:
  # ── Bundled (distributed via chezmoi) ───────────────────────────────────────
  - name: clickup-cli
    source: bundled
    enabled: true
    version: 1.0.0

  - name: slack-cli
    source: bundled
